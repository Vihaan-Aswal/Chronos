<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronos — Teacher Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Manrope:wght@300..800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:              #041523;
      --bg-deep:         #020e18;
      --surface-0:       rgba(4, 17, 30, 0.96);
      --surface-1:       rgba(7, 24, 38, 0.92);
      --surface-2:       rgba(10, 31, 48, 0.88);
      --surface-3:       rgba(14, 37, 57, 0.84);
      --border:          rgba(211, 228, 248, 0.09);
      --border-md:       rgba(211, 228, 248, 0.14);
      --border-strong:   rgba(220, 196, 146, 0.22);
      --text:            #d3e4f8;
      --text-dim:        rgba(211, 228, 248, 0.54);
      --text-mid:        rgba(211, 228, 248, 0.76);
      --gold:            #dcc492;
      --gold-dim:        rgba(220, 196, 146, 0.14);
      --gold-glow:       rgba(220, 196, 146, 0.24);
      --green:           #37d39a;
      --green-dim:       rgba(55, 211, 154, 0.14);
      --warn:            #ffb347;
      --warn-dim:        rgba(255, 179, 71, 0.14);
      --danger:          #ff6f7d;
      --danger-dim:      rgba(255, 111, 125, 0.14);
      --violet:          #a892ff;
      --violet-dim:      rgba(168, 146, 255, 0.14);
      --blue:            #7eb2ff;
      --radius-xs:       8px;
      --radius-sm:       12px;
      --radius-md:       16px;
      --radius-lg:       22px;
      --radius-xl:       28px;
      --ease:            cubic-bezier(0.16, 1, 0.3, 1);
      --t-fast:          120ms;
      --t-mid:           200ms;
      --t-slow:          300ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Manrope', ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ── */
    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .frame {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-md);
      border-radius: var(--radius-xl);
      background: linear-gradient(160deg, rgba(5, 20, 33, 0.96), rgba(3, 14, 24, 0.98));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 32px 80px rgba(0,0,0,0.5),
        0 0 120px rgba(220, 196, 146, 0.03);
      overflow: hidden;
    }

    /* subtle grain */
    .frame::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 15% 0%, rgba(220,196,146,0.07) 0%, transparent 28%),
        radial-gradient(circle at 88% 0%, rgba(126,178,255,0.07) 0%, transparent 26%),
        radial-gradient(circle at 60% 100%, rgba(168,146,255,0.05) 0%, transparent 24%);
    }

    /* grid overlay */
    .frame::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(211,228,248,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(211,228,248,0.022) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 40%, transparent 100%);
      opacity: 0.5;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(6,22,35,0.98), rgba(5,19,30,0.94));
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: 11px;
      flex-shrink: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: var(--gold);
      background: linear-gradient(145deg, rgba(220,196,146,0.16), rgba(220,196,146,0.05));
      border: 1px solid rgba(220,196,146,0.2);
      box-shadow: 0 0 14px rgba(220,196,146,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 10.5px;
      color: var(--text-dim);
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .brand-sep { opacity: 0.3; }

    /* topbar right cluster */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .ws-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(55,211,154,0.18);
      background: rgba(55,211,154,0.09);
      color: #b0f5dc;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .ws-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(55,211,154,0.2);
      animation: pulse-ws 2.4s ease-in-out infinite;
    }

    @keyframes pulse-ws {
      0%, 100% { box-shadow: 0 0 0 3px rgba(55,211,154,0.2); }
      50%       { box-shadow: 0 0 0 5px rgba(55,211,154,0.08); }
    }

    /* segmented control */
    .seg-wrap {
      display: inline-flex;
      align-items: center;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.025);
      gap: 2px;
    }

    /* ── BUTTON BASE ── */
    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      outline: none;
      transition:
        background var(--t-fast) var(--ease),
        border-color var(--t-fast) var(--ease),
        color var(--t-fast) var(--ease),
        transform var(--t-fast) var(--ease),
        box-shadow var(--t-fast) var(--ease),
        opacity var(--t-fast) var(--ease);
    }

    button:active { transform: scale(0.96); }

    .seg-btn {
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .seg-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }

    .seg-btn.active-gold {
      background: linear-gradient(160deg, rgba(220,196,146,0.2), rgba(220,196,146,0.07));
      border-color: rgba(220,196,146,0.24);
      color: #fff5de;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .seg-btn.active-blue {
      background: linear-gradient(160deg, rgba(126,178,255,0.18), rgba(126,178,255,0.06));
      border-color: rgba(126,178,255,0.22);
      color: #ddefff;
    }

    .seg-btn.active-green {
      background: linear-gradient(160deg, rgba(55,211,154,0.18), rgba(55,211,154,0.06));
      border-color: rgba(55,211,154,0.22);
      color: #d6fff1;
    }

    .cta-btn {
      padding: 7px 13px;
      border-radius: 999px;
      border: 1px solid rgba(220,196,146,0.26);
      background: linear-gradient(160deg, rgba(220,196,146,0.2), rgba(220,196,146,0.07));
      color: #fff4db;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 8px rgba(220,196,146,0.1);
    }

    .cta-btn:hover {
      background: linear-gradient(160deg, rgba(220,196,146,0.28), rgba(220,196,146,0.12));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 4px 16px rgba(220,196,146,0.18);
      transform: translateY(-1px);
    }

    /* ── WORKSPACE ── */
    .workspace {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }

    /* ── MAIN STAGE ── */
    .stage {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
      overflow: hidden;
    }

    /* ── COMPACT STATUS BAR ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(7,24,38,0.9), rgba(5,18,29,0.88));
      flex-shrink: 0;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .session-id {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.82;
    }

    .sep-line {
      width: 1px; height: 16px;
      background: var(--border-md);
    }

    .timer-display {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      color: var(--text-mid);
    }

    /* KPI chips inline */
    .kpi-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .kpi-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 11px;
      font-weight: 700;
    }

    .kpi-chip .kpi-n {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .kpi-chip .kpi-lbl {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .kpi-chip.gold {
      background: linear-gradient(135deg, rgba(220,196,146,0.12), rgba(220,196,146,0.04));
      border-color: rgba(220,196,146,0.15);
      color: #c8b07a;
    }

    .kpi-chip.green {
      background: linear-gradient(135deg, rgba(55,211,154,0.1), rgba(55,211,154,0.03));
      border-color: rgba(55,211,154,0.13);
      color: #7aac94;
    }

    .kpi-chip.warn {
      background: linear-gradient(135deg, rgba(255,179,71,0.1), rgba(255,179,71,0.03));
      border-color: rgba(255,179,71,0.13);
      color: #c0976a;
    }

    .kpi-chip.danger {
      background: linear-gradient(135deg, rgba(255,111,125,0.11), rgba(255,111,125,0.04));
      border-color: rgba(255,111,125,0.16);
      color: #b88088;
    }

    /* ── CALL TILE AREA ── */
    .tiles-shell {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(126,178,255,0.05), transparent),
        linear-gradient(180deg, rgba(4,17,28,0.9), rgba(3,13,22,0.95));
      overflow: hidden;
    }

    /* grid of tiles — no scroll, auto-fit capped */
    .tile-grid {
      position: absolute;
      inset: 0;
      display: grid;
      padding: 10px;
      gap: 8px;
      align-items: stretch;
    }

    /* Responsive grid columns/rows set by JS */

    /* ── PARTICIPANT TILE ── */
    .p-tile {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid rgba(211,228,248,0.07);
      background: linear-gradient(160deg, rgba(8,28,44,0.94), rgba(5,18,30,0.96));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition:
        border-color var(--t-mid) var(--ease),
        box-shadow var(--t-mid) var(--ease);
    }

    /* aura glow on tile border */
    .p-tile[data-state="attentive"]  { --tile-glow: rgba(55,211,154,0.3);  border-color: rgba(55,211,154,0.15); }
    .p-tile[data-state="distracted"] { --tile-glow: rgba(255,179,71,0.3);  border-color: rgba(255,179,71,0.15); }
    .p-tile[data-state="away"]       { --tile-glow: rgba(255,111,125,0.3); border-color: rgba(255,111,125,0.16); }
    .p-tile[data-state="identity"]   { --tile-glow: rgba(255,111,125,0.4); border-color: rgba(255,111,125,0.2); }
    .p-tile[data-state="risk"]       { --tile-glow: rgba(168,146,255,0.35);border-color: rgba(168,146,255,0.2); }
    .p-tile[data-state="teacher"]    { --tile-glow: rgba(220,196,146,0.35);border-color: rgba(220,196,146,0.2); }

    .p-tile::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px var(--tile-glow, transparent);
      transition: box-shadow var(--t-mid) var(--ease);
    }

    /* pulsing aura ring */
    .p-tile .aura-ring {
      position: absolute;
      inset: -3px;
      border-radius: calc(var(--radius-md) + 3px);
      pointer-events: none;
      opacity: 0;
      border: 1.5px solid var(--tile-glow, transparent);
      transition: opacity var(--t-mid) var(--ease);
      animation: aura-pulse 3s ease-in-out infinite;
    }

    .p-tile[data-state="identity"] .aura-ring,
    .p-tile[data-state="away"] .aura-ring,
    .p-tile[data-state="risk"] .aura-ring {
      opacity: 1;
    }

    @keyframes aura-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 0.8; transform: scale(1.012); }
    }

    /* face area */
    .tile-face-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .face-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 800;
      color: rgba(211,228,248,0.7);
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(211,228,248,0.1);
      position: relative;
      z-index: 1;
    }

    .face-avatar.teacher-av {
      background: linear-gradient(135deg, rgba(220,196,146,0.5), rgba(220,196,146,0.2));
      border-color: rgba(220,196,146,0.3);
    }

    /* subtle radial glow behind avatar */
    .tile-face-area::before {
      content: '';
      position: absolute;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--tile-glow, rgba(126,178,255,0.15)) 0%, transparent 70%);
      pointer-events: none;
      transition: background var(--t-slow) var(--ease);
    }

    /* tile name bar at bottom */
    .tile-name-bar {
      position: relative;
      z-index: 2;
      padding: 6px 8px;
      background: linear-gradient(180deg, transparent, rgba(2,11,19,0.92));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .tile-name-str {
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .tile-state-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .p-tile[data-state="attentive"]  .tile-state-dot { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .p-tile[data-state="distracted"] .tile-state-dot { background: var(--warn);  box-shadow: 0 0 5px var(--warn); }
    .p-tile[data-state="away"]       .tile-state-dot { background: var(--danger); box-shadow: 0 0 5px var(--danger); animation: blink-dot 1.4s ease-in-out infinite; }
    .p-tile[data-state="identity"]   .tile-state-dot { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: blink-dot 0.9s ease-in-out infinite; }
    .p-tile[data-state="risk"]       .tile-state-dot { background: var(--violet); box-shadow: 0 0 5px var(--violet); animation: blink-dot 1.2s ease-in-out infinite; }
    .p-tile[data-state="teacher"]    .tile-state-dot { background: var(--gold);   box-shadow: 0 0 5px var(--gold); }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* teacher label tag */
    .teacher-tag {
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff5de;
      background: rgba(220,196,146,0.18);
      border: 1px solid rgba(220,196,146,0.22);
      border-radius: 4px;
      padding: 2px 5px;
      flex-shrink: 0;
    }

    /* hidden members count pill */
    .overflow-tile {
      border-radius: var(--radius-md);
      border: 1px dashed rgba(211,228,248,0.1);
      background: rgba(255,255,255,0.025);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text-dim);
    }

    .overflow-count {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-mid);
    }

    .overflow-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* ── RADAR FLOAT BUTTON ── */
    .radar-btn {
      position: absolute;
      bottom: 14px;
      right: 14px;
      z-index: 6;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid rgba(220,196,146,0.38);
      background: linear-gradient(150deg, rgba(30,22,10,0.97), rgba(18,14,6,0.97));
      color: #e8d49e;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.06em;
      box-shadow:
        0 0 0 1px rgba(220,196,146,0.1) inset,
        0 8px 28px rgba(0,0,0,0.55),
        0 0 20px rgba(220,196,146,0.08);
      backdrop-filter: blur(12px);
      text-transform: uppercase;
    }

    .radar-btn:hover {
      border-color: rgba(220,196,146,0.55);
      color: #f0dea8;
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(220,196,146,0.18) inset,
        0 12px 36px rgba(0,0,0,0.6),
        0 0 28px rgba(220,196,146,0.16);
    }

    .radar-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold);
      animation: radar-spin 3s linear infinite;
    }

    @keyframes radar-spin {
      0%   { box-shadow: 0 0 6px var(--gold); }
      50%  { box-shadow: 0 0 14px var(--gold), 0 0 20px rgba(220,196,146,0.4); }
      100% { box-shadow: 0 0 6px var(--gold); }
    }

    /* legend strip */
    .tile-legend {
      position: absolute;
      bottom: 14px;
      left: 14px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(3, 14, 23, 0.8);
      backdrop-filter: blur(10px);
    }

    .legend-dot { width: 6px; height: 6px; border-radius: 50%; }
    .legend-dot.green  { background: var(--green); }
    .legend-dot.warn   { background: var(--warn); }
    .legend-dot.red    { background: var(--danger); }
    .legend-dot.violet { background: var(--violet); }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9.5px;
      font-weight: 600;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ── SIDEBAR / DASHBOARD ── */
    .sidebar {
      position: relative;
      z-index: 5;
      width: 0;
      flex-shrink: 0;
      opacity: 0;
      pointer-events: none;
      border-left: 1px solid transparent;
      background: linear-gradient(180deg, rgba(5,19,31,0.99), rgba(4,15,24,0.99));
      transition:
        width 240ms var(--ease),
        opacity 180ms ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      width: 370px;
      opacity: 1;
      pointer-events: auto;
      border-left-color: var(--border);
    }

    .sidebar-inner {
      width: 370px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* sidebar header */
    .sb-head {
      flex-shrink: 0;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(7,24,38,0.98), rgba(6,21,33,0.88));
    }

    .sb-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .sb-title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .sb-title-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
    }

    .close-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .close-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }

    /* sb summary cards */
    .sb-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .sb-mini-card {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.025);
    }

    .sb-mini-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .sb-mini-val {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .sb-mini-val.green  { color: var(--green); }
    .sb-mini-val.warn   { color: var(--warn); }
    .sb-mini-val.danger { color: var(--danger); }

    /* filter tabs */
    .sb-tabs {
      display: flex;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      gap: 2px;
    }

    .sb-tab {
      flex: 1;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-size: 10.5px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .sb-tab:hover { color: var(--text); }

    .sb-tab.active {
      background: rgba(220,196,146,0.12);
      border-color: rgba(220,196,146,0.2);
      color: #fff4db;
    }

    /* ── STUDENT LIST ── */
    .student-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(211,228,248,0.1) transparent;
    }

    .student-list::-webkit-scrollbar { width: 4px; }
    .student-list::-webkit-scrollbar-track { background: transparent; }
    .student-list::-webkit-scrollbar-thumb { background: rgba(211,228,248,0.1); border-radius: 99px; }

    /* ── STUDENT CARD (compact) ── */
    .s-card {
      position: relative;
      border-radius: 10px;
      padding: 8px 9px;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(8,26,40,0.9), rgba(5,18,29,0.85));
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition:
        border-color var(--t-fast) var(--ease),
        background var(--t-fast) var(--ease);
    }

    .s-card[data-priority="critical"] {
      border-color: rgba(255,111,125,0.2);
      background: linear-gradient(160deg, rgba(40,14,18,0.88), rgba(5,18,29,0.92));
    }

    .s-card[data-priority="high"] {
      border-color: rgba(255,179,71,0.16);
      background: linear-gradient(160deg, rgba(38,26,12,0.88), rgba(5,18,29,0.92));
    }

    .s-card[data-priority="moderate"] {
      border-color: rgba(168,146,255,0.13);
      background: linear-gradient(160deg, rgba(20,18,36,0.88), rgba(5,18,29,0.92));
    }

    /* card top row */
    .sc-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .sc-identity {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      flex: 1;
    }

    .sc-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 9.5px;
      font-weight: 800;
      color: rgba(211,228,248,0.72);
      flex-shrink: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(211,228,248,0.1);
    }

    .sc-name {
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .sc-badge {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 999px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .sc-badge.attentive  { color: #9dc8b0; background: rgba(55,211,154,0.08);  border: 1px solid rgba(55,211,154,0.14); }
    .sc-badge.distracted { color: #c8a87a; background: rgba(255,179,71,0.09);  border: 1px solid rgba(255,179,71,0.14); }
    .sc-badge.away       { color: #c8909a; background: rgba(255,111,125,0.09); border: 1px solid rgba(255,111,125,0.14); }
    .sc-badge.identity   { color: #c8909a; background: rgba(255,111,125,0.12); border: 1px solid rgba(255,111,125,0.18); }
    .sc-badge.risk       { color: #a89fcc; background: rgba(168,146,255,0.09); border: 1px solid rgba(168,146,255,0.15); }

    .sc-score-inline {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--text-dim);
      flex-shrink: 0;
      margin-left: auto;
    }

    /* signal pills */
    .sc-signals {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .sig-pill {
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 9.5px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
    }

    .sig-pill.alert  { background: rgba(255,111,125,0.09); border-color: rgba(255,111,125,0.16); color: #b89098; }
    .sig-pill.warn   { background: rgba(255,179,71,0.09);  border-color: rgba(255,179,71,0.16);  color: #b89e7a; }
    .sig-pill.ok     { background: rgba(55,211,154,0.08);  border-color: rgba(55,211,154,0.14);  color: #85a898; }
    .sig-pill.violet { background: rgba(168,146,255,0.09); border-color: rgba(168,146,255,0.16); color: #9a96b8; }

    /* action buttons */
    .sc-actions {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: nowrap;
    }

    .ic-btn {
      width: 28px; height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      transition: all var(--t-fast) var(--ease);
      flex-shrink: 0;
      position: relative;
    }

    .ic-btn svg { width: 13px; height: 13px; }

    .ic-btn:hover { transform: translateY(-1px); }

    .ic-btn.nudge   { color: #fff0cc; background: rgba(220,196,146,0.13); border-color: rgba(220,196,146,0.2);  }
    .ic-btn.nudge:hover   { background: rgba(220,196,146,0.22); box-shadow: 0 3px 10px rgba(220,196,146,0.2); }

    .ic-btn.verify  { color: #e0daff; background: rgba(168,146,255,0.12); border-color: rgba(168,146,255,0.2); }
    .ic-btn.verify:hover  { background: rgba(168,146,255,0.2); box-shadow: 0 3px 10px rgba(168,146,255,0.2); }

    .ic-btn.message { color: #c4dcff; background: rgba(126,178,255,0.12); border-color: rgba(126,178,255,0.2); }
    .ic-btn.message:hover { background: rgba(126,178,255,0.2); box-shadow: 0 3px 10px rgba(126,178,255,0.2); }

    .ic-btn.mute    { color: var(--text-dim); background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.09); }
    .ic-btn.mute:hover    { background: rgba(255,255,255,0.08); color: var(--text); }

    .ic-btn.kick    { color: #ffcdd3; background: rgba(255,111,125,0.12); border-color: rgba(255,111,125,0.2); }
    .ic-btn.kick:hover    { background: rgba(255,111,125,0.22); box-shadow: 0 3px 10px rgba(255,111,125,0.2); }

    .ic-btn.ignore  { color: var(--text-dim); }

    /* ── TOOLTIP (JS-injected, appended to body) ── */
    #js-tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
      font-family: 'Manrope', ui-sans-serif, system-ui, sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 5px 9px;
      border-radius: 7px;
      color: #f0e8d2;
      background: rgba(6,18,28,0.97);
      border: 1px solid rgba(220,196,146,0.2);
      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
      opacity: 0;
      transform: translateY(3px);
      transition: opacity 100ms ease, transform 100ms ease;
    }

    #js-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* empty state */
    .empty-msg {
      border: 1px dashed rgba(211,228,248,0.1);
      border-radius: 10px;
      padding: 20px 14px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      background: rgba(255,255,255,0.015);
    }

    /* ── ROTATION HINT ── */
    .rotation-hint {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(3,14,23,0.8);
      backdrop-filter: blur(8px);
      font-size: 9.5px;
      font-weight: 600;
      color: var(--text-dim);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .rotation-hint.visible { opacity: 1; }

    /* scrollbar globally */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(211,228,248,0.1) transparent;
    }

    @media (max-width: 1100px) {
      .sidebar.open { width: 340px; }
      .sidebar-inner { width: 340px; }
    }

    @media (max-width: 900px) {
      .sidebar {
        position: absolute;
        top: 0; right: 0; bottom: 0;
        height: 100%;
        z-index: 20;
        box-shadow: -16px 0 40px rgba(0,0,0,0.4);
      }
    }
  </style>

];

const TEACHER = { id:'tea-01', name:'You (Teacher)', initials:'YT' };
const TILES_VISIBLE = 7; // teacher + 6 students in main view
const ROTATION_INTERVAL_MS = 18000;

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let activeFilter = 'flagged';
let radarOpen    = false;
let visibleStudentIds = [];
let rotationTimer = null;
let sessionStartTime = Date.now();
let rotationHintTimer = null;

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
function initials(name) {
  return name.split(' ').slice(0, 2).map(p => p[0]).join('').toUpperCase();
}

function getRisk(s) {
  const identityIssue = s.identityStatus === 'mismatch' && s.identityMismatchCount >= 2;
  const tabIssue      = s.antiCheatViolations > 0 && s.lastViolationType === 'tab_switch';
  const multiFace     = s.multiFaceDetected === true;
  const livenessFail  = s.livenessFailed === true;
  const disengaged    = s.strikes >= 3 || s.score < 0.4;
  const flagged       = identityIssue || tabIssue || multiFace || livenessFail || disengaged;

  let level = 'normal';
  if (identityIssue || multiFace)                    level = 'critical';
  else if (tabIssue || s.strikes >= 3 || livenessFail) level = 'high';
  else if (s.score < 0.7 || s.strikes > 0)            level = 'moderate';

  let state = 'attentive', label = 'Attentive';
  if      (identityIssue) { state = 'identity';  label = 'Identity mismatch'; }
  else if (multiFace)     { state = 'risk';       label = 'Multiple faces'; }
  else if (tabIssue)      { state = 'risk';       label = 'Tab switch'; }
  else if (livenessFail)  { state = 'away';       label = 'Liveness failed'; }
  else if (s.score < 0.4 || s.strikes >= 3) { state = 'away'; label = 'Away'; }
  else if (s.score < 0.7 || s.strikes > 0)  { state = 'distracted'; label = 'Distracted'; }

  let priorityScore = Math.round((1 - s.score) * 100);
  if (identityIssue)  priorityScore += 80;
  if (multiFace)      priorityScore += 70;
  if (tabIssue)       priorityScore += 50;
  if (livenessFail)   priorityScore += 45;
  priorityScore += s.strikes * 10;

  return { flagged, level, state, label, priorityScore, identityIssue, tabIssue, multiFace, livenessFail };
}

function sortedByPriority() {
  return [...participants]
    .map(s => ({ ...s, risk: getRisk(s) }))
    .sort((a, b) => b.risk.priorityScore - a.risk.priorityScore);
}

/* ─────────────────────────────────────────────
   TILE ROTATION LOGIC
   Priority: critical > high > moderate > low
   Teacher always shown. Rotate the remaining TILES_VISIBLE-1 slots.
───────────────────────────────────────────── */
function computeVisibleStudents() {
  const sorted = sortedByPriority();
  const priorityFirst = sorted.filter(s => s.risk.flagged);
  const rest          = sorted.filter(s => !s.risk.flagged);
  const ordered       = [...priorityFirst, ...rest];
  const slots         = TILES_VISIBLE - 1; // teacher takes 1
  const visible       = ordered.slice(0, slots);
  return visible;
}

function initVisibleStudents() {
  const visible = computeVisibleStudents();
  visibleStudentIds = visible.map(s => s.id);
}

/* pick next batch: shift window by 1 from non-visible pool */
function rotateVisible() {
  const sorted = sortedByPriority();
  const priorityFirst = sorted.filter(s => s.risk.flagged);
  const rest          = sorted.filter(s => !s.risk.flagged);
  const ordered       = [...priorityFirst, ...rest];
  const slots         = TILES_VISIBLE - 1;

  if (ordered.length <= slots) return; // nothing to rotate

  // find first non-visible student
  const notVisible = ordered.filter(s => !visibleStudentIds.includes(s.id));
  if (!notVisible.length) return;

  // replace last visible (lowest priority) with first not-visible
  const lowestPriorityVisible = [...visibleStudentIds].reverse().find(id => {
    const s = ordered.find(x => x.id === id);
    return s && !s.risk.flagged;
  });

  if (lowestPriorityVisible) {
    visibleStudentIds = visibleStudentIds.filter(id => id !== lowestPriorityVisible);
    visibleStudentIds.push(notVisible[0].id);
  }

  // flash rotation hint
  const hint = document.getElementById('rotationHint');
  hint.classList.add('visible');
  clearTimeout(rotationHintTimer);
  rotationHintTimer = setTimeout(() => hint.classList.remove('visible'), 2400);
}

/* ─────────────────────────────────────────────
   RENDER TILE GRID
───────────────────────────────────────────── */
function renderTileGrid() {
  const grid = document.getElementById('tileGrid');
  if (!grid) return;

  const shell = document.getElementById('tilesShell');
  const w = shell.clientWidth  || 900;
  const h = shell.clientHeight || 500;

  // visible students from state
  const allWithRisk = participants.map(s => ({ ...s, risk: getRisk(s) }));
  const visibleStudents = visibleStudentIds
    .map(id => allWithRisk.find(s => s.id === id))
    .filter(Boolean);

  const total      = participants.length; // all students
  const showCount  = visibleStudents.length;
  const hasOverflow = total > showCount;

  // total tiles = teacher + visible students + optionally overflow tile
  const tileCount = 1 + showCount + (hasOverflow ? 1 : 0);

  // compute grid layout
  const cols = tileCount <= 2 ? tileCount
             : tileCount <= 4 ? 2
             : tileCount <= 6 ? 3
             : tileCount <= 8 ? 4 : 4;
  const rows = Math.ceil(tileCount / cols);

  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;

  const tilesHTML = [];

  // Teacher tile always first
  tilesHTML.push(`
    <div class="p-tile" data-state="teacher" aria-label="Teacher tile">
      <div class="aura-ring"></div>
      <div class="tile-face-area">
        <div class="face-avatar teacher-av">${TEACHER.initials}</div>
      </div>
      <div class="tile-name-bar">
        <span class="tile-name-str">You (Teacher)</span>
        <span class="teacher-tag">HOST</span>
        <span class="tile-state-dot"></span>
      </div>
    </div>
  `);

  // Student tiles
  visibleStudents.forEach(s => {
    tilesHTML.push(`
      <div class="p-tile" data-state="${s.risk.state}" aria-label="${s.name}">
        <div class="aura-ring"></div>
        <div class="tile-face-area">
          <div class="face-avatar">${initials(s.name)}</div>
        </div>
        <div class="tile-name-bar">
          <span class="tile-name-str">${s.name.split(' ')[0]}</span>
          <span class="tile-state-dot"></span>
        </div>
      </div>
    `);
  });

  // Overflow tile
  if (hasOverflow) {
    const hiddenCount = total - showCount;
    tilesHTML.push(`
      <div class="overflow-tile" aria-label="${hiddenCount} more students not shown">
        <span class="overflow-count">+${hiddenCount}</span>
        <span class="overflow-label">members</span>
      </div>
    `);
  }

  grid.innerHTML = tilesHTML.join('');
}

/* ─────────────────────────────────────────────
   RENDER KPIs
───────────────────────────────────────────── */
function updateKPIs() {
  const all = participants.map(s => ({ ...s, risk: getRisk(s) }));
  const attentive = all.filter(s => s.risk.state === 'attentive').length;
  const review    = all.filter(s => s.risk.state === 'distracted' || s.risk.state === 'risk').length;
  const critical  = all.filter(s => s.risk.level === 'critical').length;
  const flagged   = all.filter(s => s.risk.flagged).length;
  const identity  = all.filter(s => s.risk.identityIssue).length;
  const avgScore  = Math.round(all.reduce((sum, s) => sum + s.score, 0) / all.length * 100);

  document.getElementById('kpi-present').textContent  = all.length;
  document.getElementById('kpi-attentive').textContent = attentive;
  document.getElementById('kpi-review').textContent    = review;
  document.getElementById('kpi-critical').textContent  = critical;
  document.getElementById('summary-flagged').textContent  = flagged;
  document.getElementById('summary-identity').textContent = identity;
  document.getElementById('summary-score').textContent    = avgScore + '%';
}

/* ─────────────────────────────────────────────
   RENDER STUDENT LIST (sidebar)
───────────────────────────────────────────── */
function renderStudentList() {
  const list = document.getElementById('studentList');
  if (!list) return;

  const all = participants.map(s => ({ ...s, risk: getRisk(s) }));
  const filtered = activeFilter === 'flagged'
    ? all.filter(s => s.risk.flagged)
    : all;
  const sorted = [...filtered].sort((a, b) => b.risk.priorityScore - a.risk.priorityScore || a.score - b.score);

  if (!sorted.length) {
    list.innerHTML = `<div class="empty-msg">No flagged students right now — the class looks calm.</div>`;
    return;
  }

  list.innerHTML = sorted.map(s => {
    const r = s.risk;
    const pct = Math.round(s.score * 100);

    const signals = [];
    if (r.identityIssue) signals.push(`<span class="sig-pill alert">Identity mismatch</span>`);
    if (r.multiFace)     signals.push(`<span class="sig-pill alert">Multiple faces</span>`);
    if (r.tabIssue)      signals.push(`<span class="sig-pill warn">Tab switched</span>`);
    if (r.livenessFail)  signals.push(`<span class="sig-pill violet">Liveness fail</span>`);
    if (s.simulated)     signals.push(`<span class="sig-pill violet">Simulated</span>`);
    if (s.strikes > 0)   signals.push(`<span class="sig-pill ${s.strikes >= 3 ? 'alert' : 'warn'}">${s.strikes} strike${s.strikes > 1 ? 's' : ''}</span>`);
    if (!signals.length) signals.push(s.score >= 0.7 ? `<span class="sig-pill ok">Stable</span>` : `<span class="sig-pill warn">Focus dip</span>`);

    const priority = r.level === 'normal' ? 'moderate' : r.level;

    return `
      <article class="s-card" data-priority="${priority}">
        <div class="sc-top">
          <div class="sc-identity">
            <div class="sc-avatar">${initials(s.name)}</div>
            <span class="sc-name">${s.name}</span>
          </div>
          <span class="sc-score-inline">${pct}%</span>
          <span class="sc-badge ${r.state}">${r.label}</span>
        </div>

        <div class="sc-signals">${signals.join('')}</div>

        <div class="sc-actions">
          <button class="ic-btn nudge"   data-icbtn="Nudge"   aria-label="Nudge">${icons.nudge}</button>
          <button class="ic-btn verify"  data-icbtn="Verify"  aria-label="Verify">${icons.verify}</button>
          <button class="ic-btn message" data-icbtn="Message" aria-label="Message">${icons.message}</button>
          <button class="ic-btn mute"    data-icbtn="Mute"    aria-label="Mute">${icons.mute}</button>
          <button class="ic-btn ignore"  data-icbtn="Dismiss" aria-label="Dismiss">${icons.ignore}</button>
          <button class="ic-btn kick"    data-icbtn="Remove"  aria-label="Remove">${icons.kick}</button>
        </div>
      </article>
    `;
  }).join('');
}

/* ─────────────────────────────────────────────
   SIDEBAR TOGGLE
───────────────────────────────────────────── */
function setRadar(open) {
  radarOpen = open;
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('open', open);
}

document.getElementById('toggleRadar').addEventListener('click', () => setRadar(!radarOpen));
document.getElementById('closeRadar').addEventListener('click',  () => setRadar(false));

/* filter tabs */
document.getElementById('flaggedTab').addEventListener('click', () => {
  activeFilter = 'flagged';
  document.getElementById('flaggedTab').classList.add('active');
  document.getElementById('allTab').classList.remove('active');
  renderStudentList();
});

document.getElementById('allTab').addEventListener('click', () => {
  activeFilter = 'all';
  document.getElementById('allTab').classList.add('active');
  document.getElementById('flaggedTab').classList.remove('active');
  renderStudentList();
});

/* ─────────────────────────────────────────────
   TIMER
───────────────────────────────────────────── */
function updateTimer() {
  const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
  const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
  const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timerDisplay').textContent = `${h}:${m}:${s}`;
}

/* ─────────────────────────────────────────────
   LIVE SIMULATION (score drift)
───────────────────────────────────────────── */
function driftScores() {
  participants.forEach(s => {
    const delta = (Math.random() - 0.48) * 0.06;
    s.score = Math.min(1, Math.max(0.05, s.score + delta));
  });
}

/* ─────────────────────────────────────────────
   MASTER RENDER
───────────────────────────────────────────── */
function render() {
  updateKPIs();
  renderTileGrid();
  renderStudentList();
}

/* ─────────────────────────────────────────────
   INIT & LOOPS
───────────────────────────────────────────── */
initVisibleStudents();
render();

// fast timer
setInterval(updateTimer, 1000);

// slow data drift + re-render
setInterval(() => {
  driftScores();
  render();
}, 3500);

// tile rotation
rotationTimer = setInterval(() => {
  rotateVisible();
  renderTileGrid();
}, ROTATION_INTERVAL_MS);

// handle resize
window.addEventListener('resize', () => renderTileGrid());

/* ─────────────────────────────────────────────
   JS TOOLTIP ENGINE
   Appends a single <div> to <body> and positions
   it via getBoundingClientRect — never clipped.
───────────────────────────────────────────── */
(function initTooltips() {
  const tip = document.createElement('div');
  tip.id = 'js-tooltip';
  document.body.appendChild(tip);

  let hideTimer = null;

  function showTip(el, label) {
    clearTimeout(hideTimer);
    tip.textContent = label;
    tip.classList.remove('visible');

    // determine placement: prefer above, fall back to below
    const r = el.getBoundingClientRect();
    const GAP = 8;
    tip.style.visibility = 'hidden';
    tip.style.opacity = '0';
    tip.classList.add('visible');
    const tw = tip.offsetWidth;
    const th = tip.offsetHeight;
    tip.classList.remove('visible');
    tip.style.visibility = '';

    // X: centered on element, clamped to viewport
    let x = r.left + r.width / 2 - tw / 2;
    x = Math.max(8, Math.min(x, window.innerWidth - tw - 8));

    // Y: above by default
    let y = r.top - th - GAP;
    if (y < 8) y = r.bottom + GAP; // flip below if no room above

    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';

    // force reflow then show
    requestAnimationFrame(() => {
      tip.classList.add('visible');
    });
  }

  function hideTip() {
    hideTimer = setTimeout(() => {
      tip.classList.remove('visible');
    }, 80);
  }

  // Wire [data-tip] — static elements
  function bindStatic() {
    document.querySelectorAll('[data-tip]').forEach(el => {
      el.addEventListener('mouseenter', () => showTip(el, el.dataset.tip));
      el.addEventListener('mouseleave', hideTip);
      el.addEventListener('focus',      () => showTip(el, el.dataset.tip));
      el.addEventListener('blur',       hideTip);
    });
  }

  // Wire [data-icbtn] — dynamically rendered card buttons
  document.addEventListener('mouseenter', e => {
    const el = e.target.closest('[data-icbtn]');
    if (el) showTip(el, el.dataset.icbtn);
  }, true);

  document.addEventListener('mouseleave', e => {
    if (e.target.closest('[data-icbtn]')) hideTip();
  }, true);

  // initial bind + re-bind after every render
  bindStatic();
  const origRender = window.render;
  window.render = function() {
    origRender && origRender();
    // re-bind static after DOM update
    setTimeout(bindStatic, 0);
  };
})();
